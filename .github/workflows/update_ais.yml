name: Update AIS Snapshot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-ais:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install websockets requests

      - name: Fetch AIS data
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          python scripts/fetch_ais.py

      - name: Commit and push
        run: |
         git config --local user.email "github-actions[bot]@users.noreply.github.com"
         git config --local user.name "github-actions[bot]"
         git add data/ais-snapshot.json
         git stash
         git pull --rebase origin main
         git stash pop
         git checkout --theirs data/ais-snapshot.json
         git add data/ais-snapshot.json
         git diff --staged --quiet || git commit -m "chore: update AIS snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
         git push

